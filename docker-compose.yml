services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: .
      args:
        APP_ENV: local
    command: ["sh", "./docker/start-web.sh"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DEBUG: "True"
      TIME_ZONE: Europe/Moscow
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://platform:platform@db:5432/platform}
      DATABASE_CONN_MAX_AGE: "60"
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      CACHE_URL: ${CACHE_URL_DOCKER:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL_DOCKER:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND_DOCKER:-redis://redis:6379/2}
      EMAIL_BACKEND: ${EMAIL_BACKEND_DOCKER:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST_DOCKER:-mailpit}
      EMAIL_PORT: ${EMAIL_PORT_DOCKER:-1025}
      EMAIL_USE_TLS: "False"
      EMAIL_USE_SSL: "False"
      PUBLIC_CONTACT_EMAIL: ${PUBLIC_CONTACT_EMAIL:-service@atlas-machinery.ru}
      PUBLIC_CONTACT_PHONE: ${PUBLIC_CONTACT_PHONE:-+7 800 000-00-00}
      PUBLIC_OPERATOR_NAME: ${PUBLIC_OPERATOR_NAME:-Сервисная служба}
      PUBLIC_OPERATOR_ADDRESS: ${PUBLIC_OPERATOR_ADDRESS:-Москва, Россия}
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  celery_worker:
    build:
      context: .
      args:
        APP_ENV: local
    command: ["sh", "./docker/start-celery-worker.sh"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DEBUG: "True"
      TIME_ZONE: Europe/Moscow
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://platform:platform@db:5432/platform}
      DATABASE_CONN_MAX_AGE: "60"
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      CACHE_URL: ${CACHE_URL_DOCKER:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL_DOCKER:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND_DOCKER:-redis://redis:6379/2}
      CELERY_WORKER_CONCURRENCY: "2"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      args:
        APP_ENV: local
    command: ["sh", "./docker/start-celery-beat.sh"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DEBUG: "True"
      TIME_ZONE: Europe/Moscow
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgres://platform:platform@db:5432/platform}
      DATABASE_CONN_MAX_AGE: "60"
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      CACHE_URL: ${CACHE_URL_DOCKER:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL_DOCKER:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND_DOCKER:-redis://redis:6379/2}
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:

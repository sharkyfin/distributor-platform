[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "-ra"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "migrations",
    "node_modules",
    "staticfiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
